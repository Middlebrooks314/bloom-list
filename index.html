<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bloom list</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Fredoka', sans-serif; }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-3deg); }
      75% { transform: rotate(3deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    const MAX_PRIORITIES = 5;
    const STORAGE_KEY = "bloom-list-state";

    const MODES = {
      PLAN: "plan",
      CAPTURE: "capture",
      COMBO: "combo",
    };

    const COLORS = [
      { bg: "#FFE066", border: "#FFD43B", text: "#5C4813", emoji: "🌻" },
      { bg: "#A7F3D0", border: "#6EE7B7", text: "#065F46", emoji: "🌿" },
      { bg: "#C4B5FD", border: "#A78BFA", text: "#3B1F8E", emoji: "🔮" },
      { bg: "#FCA5A5", border: "#F87171", text: "#7F1D1D", emoji: "🍓" },
      { bg: "#93C5FD", border: "#60A5FA", text: "#1E3A5F", emoji: "🫧" },
      { bg: "#FDBA74", border: "#FB923C", text: "#7C2D12", emoji: "🍊" },
      { bg: "#F9A8D4", border: "#F472B6", text: "#831843", emoji: "🌸" },
      { bg: "#86EFAC", border: "#4ADE80", text: "#14532D", emoji: "🥝" },
    ];

    const CELEBRATIONS = [
      "You showed up today. That counts. 💛",
      "Look at you go! Every little thing matters. 🌟",
      "Progress isn't always a straight line, and that's okay. 🌈",
      "You did things today! That's the whole point. 🎉",
      "Some days just existing is the win. Proud of you. 🌻",
      "Not bad for a day on planet Earth! 🌍✨",
    ];

    function getColorForIndex(index) {
      return COLORS[index % COLORS.length];
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const saved = JSON.parse(raw);
        const savedDate = saved.date;
        const today = new Date().toDateString();
        if (savedDate !== today) return null;
        return saved;
      } catch {
        return null;
      }
    }

    function saveState(mode, planTasks, captureTasks) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          date: new Date().toDateString(),
          mode,
          planTasks,
          captureTasks,
        }));
      } catch { /* storage full or unavailable */ }
    }

    function DragHandle() {
      return (
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" opacity="0.4" style={{ flexShrink: 0 }}>
          <circle cx="5" cy="3" r="1.5" />
          <circle cx="11" cy="3" r="1.5" />
          <circle cx="5" cy="8" r="1.5" />
          <circle cx="11" cy="8" r="1.5" />
          <circle cx="5" cy="13" r="1.5" />
          <circle cx="11" cy="13" r="1.5" />
        </svg>
      );
    }

    const MODE_OPTIONS = [
      { key: MODES.PLAN, label: "Plan", emoji: "📋", bg: "#C4B5FD" },
      { key: MODES.CAPTURE, label: "Capture", emoji: "✨", bg: "#A7F3D0" },
      { key: MODES.COMBO, label: "Full Picture", emoji: "🧩", bg: "#93C5FD" },
    ];

    function ModePicker({ mode, onChange }) {
      return (
        <div style={{ display: "flex", gap: "8px", justifyContent: "center", flexWrap: "wrap" }}>
          {MODE_OPTIONS.map((opt) => {
            const isActive = mode === opt.key;
            return (
              <button
                key={opt.key}
                onClick={() => onChange(opt.key)}
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: "6px",
                  padding: "8px 16px",
                  borderRadius: "50px",
                  border: "3px solid #1a1a2e",
                  background: isActive ? opt.bg : "#FFFBEB",
                  cursor: "pointer",
                  fontFamily: "'Fredoka', sans-serif",
                  fontSize: "14px",
                  fontWeight: 600,
                  color: "#1a1a2e",
                  transition: "all 0.25s ease",
                  boxShadow: isActive ? "3px 3px 0 #1a1a2e" : "1px 1px 0 #1a1a2e",
                  transform: isActive ? "translateY(-1px)" : "none",
                  opacity: isActive ? 1 : 0.7,
                }}
              >
                <span style={{ fontSize: "16px" }}>{opt.emoji}</span>
                <span>{opt.label}</span>
              </button>
            );
          })}
        </div>
      );
    }

    function TaskItem({ task, index, colorIndex, mode, onRemove, onToggleDone, onDragStart, onDragOver, onDrop }) {
      const color = getColorForIndex(colorIndex);
      const [isHovered, setIsHovered] = useState(false);
      const [justAdded, setJustAdded] = useState(task.isNew);
      const isDone = task.done && mode === MODES.PLAN;

      useEffect(() => {
        if (task.isNew) {
          const timer = setTimeout(() => setJustAdded(false), 400);
          return () => clearTimeout(timer);
        }
      }, [task.isNew]);

      return (
        <div
          draggable
          onDragStart={(e) => onDragStart(e, index)}
          onDragOver={(e) => onDragOver(e, index)}
          onDrop={(e) => onDrop(e, index)}
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => setIsHovered(false)}
          style={{
            display: "flex",
            alignItems: "center",
            gap: "12px",
            padding: "14px 16px",
            borderRadius: "16px",
            border: "3px solid #1a1a2e",
            background: isDone ? `${color.bg}88` : color.bg,
            color: color.text,
            fontFamily: "'Fredoka', sans-serif",
            fontSize: "16px",
            fontWeight: 500,
            cursor: "grab",
            transition: "transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease",
            transform: isHovered ? "translateX(4px)" : "translateX(0)",
            boxShadow: isHovered ? "4px 4px 0 #1a1a2e" : "2px 2px 0 #1a1a2e",
            animation: justAdded ? "popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)" : "none",
            opacity: isDone ? 0.65 : 1,
            position: "relative",
          }}
        >
          <DragHandle />
          {mode === MODES.PLAN ? (
            <button
              onClick={() => onToggleDone(task.id)}
              style={{
                width: "24px",
                height: "24px",
                borderRadius: "8px",
                border: `3px solid ${color.text}44`,
                background: isDone ? color.text : "transparent",
                cursor: "pointer",
                flexShrink: 0,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                transition: "all 0.2s ease",
                padding: 0,
              }}
              aria-label={isDone ? "Mark as not done" : "Mark as done"}
            >
              {isDone && (
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M3 7L6 10L11 4" stroke={color.bg} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
              )}
            </button>
          ) : (
            <span style={{ fontSize: "18px", flexShrink: 0 }}>{color.emoji}</span>
          )}
          <span style={{
            flex: 1,
            lineHeight: 1.3,
            textDecoration: isDone ? "line-through" : "none",
            opacity: isDone ? 0.7 : 1,
          }}>
            {task.text}
          </span>
          {mode === MODES.PLAN && (
            <span style={{ fontSize: "12px", opacity: 0.5, flexShrink: 0, fontWeight: 600 }}>
              #{index + 1}
            </span>
          )}
          <button
            onClick={() => onRemove(task.id)}
            style={{
              background: "none",
              border: "none",
              cursor: "pointer",
              fontSize: "18px",
              opacity: isHovered ? 0.8 : 0.3,
              transition: "opacity 0.2s",
              padding: "0 2px",
              flexShrink: 0,
            }}
            aria-label="Remove item"
          >
            ×
          </button>
        </div>
      );
    }

    function TaskInput({ onAdd, placeholder, disabled, disabledMessage }) {
      const [value, setValue] = useState("");
      const inputRef = useRef(null);

      const handleSubmit = () => {
        const trimmed = value.trim();
        if (!trimmed) return;
        onAdd(trimmed);
        setValue("");
        inputRef.current?.focus();
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter") handleSubmit();
      };

      return (
        <div style={{ position: "relative" }}>
          <div style={{ display: "flex", gap: "8px", opacity: disabled ? 0.5 : 1, transition: "opacity 0.3s" }}>
            <input
              ref={inputRef}
              type="text"
              value={value}
              onChange={(e) => setValue(e.target.value)}
              onKeyDown={handleKeyDown}
              disabled={disabled}
              placeholder={disabled ? disabledMessage : placeholder}
              style={{
                flex: 1,
                padding: "14px 18px",
                borderRadius: "14px",
                border: "3px solid #1a1a2e",
                fontFamily: "'Fredoka', sans-serif",
                fontSize: "16px",
                fontWeight: 500,
                background: "#FFFBEB",
                color: "#1a1a2e",
                outline: "none",
                boxShadow: "inset 2px 2px 0 rgba(0,0,0,0.05)",
              }}
            />
            <button
              onClick={handleSubmit}
              disabled={disabled || !value.trim()}
              style={{
                padding: "14px 22px",
                borderRadius: "14px",
                border: "3px solid #1a1a2e",
                background: disabled ? "#e5e5e5" : "#FFE066",
                fontFamily: "'Fredoka', sans-serif",
                fontSize: "16px",
                fontWeight: 600,
                cursor: disabled ? "not-allowed" : "pointer",
                color: "#1a1a2e",
                boxShadow: "2px 2px 0 #1a1a2e",
                transition: "all 0.2s",
              }}
            >
              +
            </button>
          </div>
        </div>
      );
    }

    function Summary({ doneItems, unfinishedItems, onDismiss, onGoBack }) {
      const [celebration] = useState(
        () => CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)]
      );
      const doneCount = doneItems.length;
      const unfinishedCount = unfinishedItems.length;

      return (
        <div
          style={{
            position: "fixed",
            inset: 0,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            background: "rgba(26, 26, 46, 0.6)",
            backdropFilter: "blur(8px)",
            zIndex: 100,
            animation: "fadeIn 0.3s ease",
          }}
        >
          <div
            style={{
              background: "#FFFBEB",
              borderRadius: "24px",
              border: "4px solid #1a1a2e",
              boxShadow: "6px 6px 0 #1a1a2e",
              padding: "36px 32px",
              maxWidth: "420px",
              width: "90%",
              textAlign: "center",
              fontFamily: "'Fredoka', sans-serif",
              animation: "popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)",
              maxHeight: "85vh",
              overflowY: "auto",
            }}
          >
            <div style={{ fontSize: "48px", marginBottom: "12px" }}>🌈</div>
            <h2 style={{ fontSize: "24px", fontWeight: 700, color: "#1a1a2e", margin: "0 0 8px" }}>
              Today's Wrap-Up
            </h2>
            <p style={{ fontSize: "16px", color: "#6B7280", margin: "0 0 20px", lineHeight: 1.5 }}>
              {celebration}
            </p>

            <div
              style={{
                background: "#F0FDF4",
                borderRadius: "16px",
                border: "2px solid #BBF7D0",
                padding: "16px",
                marginBottom: "20px",
              }}
            >
              <div style={{ fontSize: "36px", fontWeight: 700, color: "#065F46" }}>{doneCount}</div>
              <div style={{ fontSize: "14px", color: "#065F46", fontWeight: 500 }}>
                {doneCount === 1 ? "thing accomplished" : "things accomplished"}
              </div>
            </div>

            {doneCount === 0 && (
              <p style={{ fontSize: "14px", color: "#9CA3AF", margin: "0 0 20px", lineHeight: 1.5 }}>
                Nothing checked off today, and that's okay. Some days are like that.
              </p>
            )}

            {doneCount > 0 && (
              <div style={{ textAlign: "left", marginBottom: "20px" }}>
                {doneItems.map((task, i) => (
                  <div
                    key={task.id}
                    style={{
                      padding: "8px 12px",
                      fontSize: "14px",
                      color: "#374151",
                      borderBottom: i < doneItems.length - 1 ? "1px solid #E5E7EB" : "none",
                      display: "flex",
                      gap: "8px",
                      alignItems: "center",
                    }}
                  >
                    <span>{getColorForIndex(i).emoji}</span>
                    <span>{task.text}</span>
                  </div>
                ))}
              </div>
            )}

            {unfinishedCount > 0 && (
              <div style={{ marginBottom: "20px" }}>
                <div
                  style={{
                    background: "#FFF7ED",
                    borderRadius: "16px",
                    border: "2px solid #FED7AA",
                    padding: "16px",
                  }}
                >
                  <div style={{ fontSize: "13px", fontWeight: 600, color: "#9A3412", marginBottom: "10px" }}>
                    {unfinishedCount} {unfinishedCount === 1 ? "priority" : "priorities"} still on the list
                  </div>
                  <div style={{ textAlign: "left" }}>
                    {unfinishedItems.map((task, i) => (
                      <div
                        key={task.id}
                        style={{
                          padding: "6px 8px",
                          fontSize: "13px",
                          color: "#78350F",
                          borderBottom: i < unfinishedItems.length - 1 ? "1px solid #FED7AA" : "none",
                          display: "flex",
                          gap: "8px",
                          alignItems: "center",
                        }}
                      >
                        <span style={{ opacity: 0.5 }}>○</span>
                        <span>{task.text}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <p style={{ fontSize: "12px", color: "#9CA3AF", margin: "8px 0 0", lineHeight: 1.4 }}>
                  No pressure. They'll be here if you go back.
                </p>
              </div>
            )}

            <div style={{ display: "flex", gap: "10px", justifyContent: "center", flexWrap: "wrap" }}>
              <button
                onClick={onGoBack}
                style={{
                  padding: "12px 24px",
                  borderRadius: "14px",
                  border: "3px solid #1a1a2e",
                  background: "#FFFBEB",
                  fontFamily: "'Fredoka', sans-serif",
                  fontSize: "15px",
                  fontWeight: 600,
                  cursor: "pointer",
                  color: "#1a1a2e",
                  boxShadow: "2px 2px 0 #1a1a2e",
                }}
              >
                Go Back 👈
              </button>
              <button
                onClick={onDismiss}
                style={{
                  padding: "12px 24px",
                  borderRadius: "14px",
                  border: "3px solid #1a1a2e",
                  background: "#C4B5FD",
                  fontFamily: "'Fredoka', sans-serif",
                  fontSize: "15px",
                  fontWeight: 600,
                  cursor: "pointer",
                  color: "#1a1a2e",
                  boxShadow: "3px 3px 0 #1a1a2e",
                }}
              >
                Start Fresh 🌱
              </button>
            </div>
          </div>
        </div>
      );
    }

    function SectionCard({ title, subtitle, borderColor, children }) {
      const hasChildren = React.Children.count(children) > 0;
      return (
        <div
          style={{
            borderRadius: "20px",
            border: `3px solid ${borderColor}`,
            background: `${borderColor}18`,
            padding: "16px",
          }}
        >
          <div
            style={{
              fontFamily: "'Fredoka', sans-serif",
              fontSize: "15px",
              fontWeight: 700,
              color: "#1a1a2e",
              marginBottom: hasChildren ? "12px" : "0",
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
            }}
          >
            <span>{title}</span>
            {subtitle && (
              <span style={{ fontSize: "12px", fontWeight: 500, color: "#9CA3AF" }}>{subtitle}</span>
            )}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
            {children}
          </div>
        </div>
      );
    }

    function EmptyState({ mode }) {
      const isPlan = mode === MODES.PLAN;
      return (
        <div style={{ textAlign: "center", padding: "40px 20px", fontFamily: "'Fredoka', sans-serif" }}>
          <div style={{ fontSize: "48px", marginBottom: "12px" }}>
            {isPlan ? "🎯" : "🌱"}
          </div>
          <p style={{ fontSize: "16px", color: "#9CA3AF", fontWeight: 500, margin: 0, lineHeight: 1.6 }}>
            {isPlan
              ? "Add up to 5 priorities for today. Only the important stuff."
              : "Did something? Anything? Add it here. No pressure."}
          </p>
        </div>
      );
    }

    function BloomList() {
      const saved = useRef(loadState()).current;
      const [mode, setMode] = useState(saved?.mode || MODES.PLAN);
      const [planTasks, setPlanTasks] = useState(saved?.planTasks || []);
      const [captureTasks, setCaptureTasks] = useState(saved?.captureTasks || []);
      const [showSummary, setShowSummary] = useState(false);
      const [colorOffset] = useState(() => Math.floor(Math.random() * COLORS.length));
      const [comboInputTarget, setComboInputTarget] = useState(MODES.CAPTURE);
      const dragItem = useRef(null);
      const dragListRef = useRef(null);

      const isPlan = mode === MODES.PLAN;
      const isCapture = mode === MODES.CAPTURE;
      const isCombo = mode === MODES.COMBO;

      useEffect(() => {
        saveState(mode, planTasks, captureTasks);
      }, [mode, planTasks, captureTasks]);

      const addTask = useCallback((text) => {
        const newTask = { id: generateId(), text, isNew: true, done: false };
        if (isPlan || (isCombo && comboInputTarget === MODES.PLAN)) {
          setPlanTasks((prev) => [...prev, newTask]);
        } else {
          setCaptureTasks((prev) => [...prev, newTask]);
        }
      }, [isPlan, isCombo, comboInputTarget]);

      const removePlanTask = useCallback((id) => {
        setPlanTasks((prev) => prev.filter((t) => t.id !== id));
      }, []);

      const removeCaptureTask = useCallback((id) => {
        setCaptureTasks((prev) => prev.filter((t) => t.id !== id));
      }, []);

      const removeTask = useCallback((id) => {
        if (isPlan) removePlanTask(id);
        else if (isCapture) removeCaptureTask(id);
      }, [isPlan, isCapture, removePlanTask, removeCaptureTask]);

      const toggleDone = useCallback((id) => {
        setPlanTasks((prev) =>
          prev.map((t) => (t.id === id ? { ...t, done: !t.done } : t))
        );
      }, []);

      const makeDragHandlers = (setter) => ({
        onDragStart: (e, index) => {
          dragItem.current = index;
          dragListRef.current = setter;
          e.dataTransfer.effectAllowed = "move";
        },
        onDragOver: (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
        },
        onDrop: (e, dropIndex) => {
          e.preventDefault();
          const dragIndex = dragItem.current;
          const targetSetter = dragListRef.current;
          if (dragIndex === null || dragIndex === dropIndex || targetSetter !== setter) return;
          setter((prev) => {
            const updated = [...prev];
            const [dragged] = updated.splice(dragIndex, 1);
            updated.splice(dropIndex, 0, dragged);
            return updated;
          });
          dragItem.current = null;
          dragListRef.current = null;
        },
      });

      const planDrag = makeDragHandlers(setPlanTasks);
      const captureDrag = makeDragHandlers(setCaptureTasks);
      const activeDrag = isPlan ? planDrag : captureDrag;

      const completedPlanTasks = planTasks.filter((t) => t.done);
      const unfinishedPlanTasks = planTasks.filter((t) => !t.done);
      const allDoneItems = [...completedPlanTasks, ...captureTasks];

      const handleWrapUp = () => setShowSummary(true);
      const handleGoBack = () => setShowSummary(false);

      const handleStartFresh = () => {
        setShowSummary(false);
        setPlanTasks([]);
        setCaptureTasks([]);
      };

      const planAtLimit = planTasks.length >= MAX_PRIORITIES;
      const isAtLimit = (isPlan || (isCombo && comboInputTarget === MODES.PLAN)) && planAtLimit;
      const spotsLeft = MAX_PRIORITIES - planTasks.length;

      const inputPlaceholder = isCombo
        ? comboInputTarget === MODES.PLAN
          ? "What's a priority today?"
          : "What did you just do?"
        : isPlan
          ? "What's a priority today?"
          : "What did you just do?";

      return (
        <div
          style={{
            minHeight: "100vh",
            background: "linear-gradient(145deg, #FFF7ED 0%, #FDF2F8 40%, #EDE9FE 70%, #ECFDF5 100%)",
            padding: "32px 16px",
            fontFamily: "'Fredoka', sans-serif",
          }}
        >
          <div style={{ maxWidth: "480px", margin: "0 auto" }}>
            {/* Header */}
            <div style={{ textAlign: "center", marginBottom: "28px" }}>
              <h1 style={{ fontSize: "36px", fontWeight: 700, color: "#1a1a2e", margin: "0 0 4px", letterSpacing: "-0.5px" }}>
                <span style={{ display: "inline-block", animation: "float 3s ease-in-out infinite" }}>🌸</span>{" "}
                bloom list
              </h1>
              <p style={{ fontSize: "14px", color: "#9CA3AF", margin: 0, fontWeight: 500 }}>
                your day, your way
              </p>
            </div>

            {/* Mode Picker */}
            <div style={{ display: "flex", justifyContent: "center", marginBottom: "24px" }}>
              <ModePicker mode={mode} onChange={setMode} />
            </div>

            {/* Counter (when adding to plan) */}
            {(isPlan || (isCombo && comboInputTarget === MODES.PLAN)) && (
              <div
                style={{
                  textAlign: "center",
                  marginBottom: "16px",
                  fontSize: "13px",
                  fontWeight: 600,
                  color: planAtLimit ? "#DC2626" : "#6B7280",
                  transition: "color 0.3s",
                }}
              >
                {planAtLimit
                  ? "All 5 spots filled! Drop one to add another."
                  : `${spotsLeft} spot${spotsLeft !== 1 ? "s" : ""} left`}
              </div>
            )}

            {/* Combo input target toggle */}
            {isCombo && (
              <div style={{ display: "flex", justifyContent: "center", marginBottom: "12px" }}>
                <div style={{ display: "inline-flex", borderRadius: "12px", border: "2px solid #1a1a2e22", overflow: "hidden" }}>
                  {[
                    { key: MODES.PLAN, label: "📋 Add to Plan" },
                    { key: MODES.CAPTURE, label: "✨ Add to Capture" },
                  ].map((opt) => {
                    const active = comboInputTarget === opt.key;
                    return (
                      <button
                        key={opt.key}
                        onClick={() => setComboInputTarget(opt.key)}
                        style={{
                          padding: "6px 14px",
                          border: "none",
                          background: active ? "#1a1a2e" : "transparent",
                          color: active ? "#FFFBEB" : "#1a1a2e",
                          fontFamily: "'Fredoka', sans-serif",
                          fontSize: "13px",
                          fontWeight: 600,
                          cursor: "pointer",
                          transition: "all 0.2s",
                        }}
                      >
                        {opt.label}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Input */}
            <div style={{ marginBottom: "20px" }}>
              <TaskInput
                onAdd={addTask}
                placeholder={inputPlaceholder}
                disabled={isAtLimit}
                disabledMessage="Drop a priority to add a new one"
              />
            </div>

            {/* Single-mode task list */}
            {!isCombo && (
              <div style={{ display: "flex", flexDirection: "column", gap: "10px", marginBottom: "28px" }}>
                {(isPlan ? planTasks : captureTasks).length === 0 ? (
                  <EmptyState mode={mode} />
                ) : (
                  (isPlan ? planTasks : captureTasks).map((task, index) => (
                    <TaskItem
                      key={task.id}
                      task={task}
                      index={index}
                      colorIndex={index + colorOffset}
                      mode={isPlan ? MODES.PLAN : MODES.CAPTURE}
                      onRemove={removeTask}
                      onToggleDone={toggleDone}
                      onDragStart={activeDrag.onDragStart}
                      onDragOver={activeDrag.onDragOver}
                      onDrop={activeDrag.onDrop}
                    />
                  ))
                )}
              </div>
            )}

            {/* Combo view */}
            {isCombo && (
              <div style={{ display: "flex", flexDirection: "column", gap: "24px", marginBottom: "28px" }}>
                <SectionCard
                  title="📋 Planned"
                  subtitle={planTasks.length === 0 ? "Nothing planned yet" : null}
                  borderColor="#C4B5FD"
                >
                  {planTasks.map((task, index) => (
                    <TaskItem
                      key={task.id}
                      task={task}
                      index={index}
                      colorIndex={index + colorOffset}
                      mode={MODES.PLAN}
                      onRemove={removePlanTask}
                      onToggleDone={toggleDone}
                      onDragStart={planDrag.onDragStart}
                      onDragOver={planDrag.onDragOver}
                      onDrop={planDrag.onDrop}
                    />
                  ))}
                </SectionCard>

                <SectionCard
                  title="✨ Captured"
                  subtitle={captureTasks.length === 0 ? "Nothing captured yet" : null}
                  borderColor="#A7F3D0"
                >
                  {captureTasks.map((task, index) => (
                    <TaskItem
                      key={task.id}
                      task={task}
                      index={index}
                      colorIndex={index + colorOffset + planTasks.length}
                      mode={MODES.CAPTURE}
                      onRemove={removeCaptureTask}
                      onToggleDone={toggleDone}
                      onDragStart={captureDrag.onDragStart}
                      onDragOver={captureDrag.onDragOver}
                      onDrop={captureDrag.onDrop}
                    />
                  ))}
                </SectionCard>
              </div>
            )}

            {/* Wrap Up Button */}
            {allDoneItems.length > 0 && (
              <div style={{ textAlign: "center" }}>
                <button
                  onClick={handleWrapUp}
                  style={{
                    padding: "14px 32px",
                    borderRadius: "50px",
                    border: "3px solid #1a1a2e",
                    background: "#FCA5A5",
                    fontFamily: "'Fredoka', sans-serif",
                    fontSize: "16px",
                    fontWeight: 600,
                    cursor: "pointer",
                    color: "#1a1a2e",
                    boxShadow: "3px 3px 0 #1a1a2e",
                    animation: "wiggle 2s ease-in-out infinite",
                  }}
                >
                  Wrap Up My Day 🌙
                </button>
              </div>
            )}
          </div>

          {/* Summary Modal */}
          {showSummary && (
            <Summary
              doneItems={allDoneItems}
              unfinishedItems={unfinishedPlanTasks}
              onDismiss={handleStartFresh}
              onGoBack={handleGoBack}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<BloomList />);
  </script>
</body>
</html>
